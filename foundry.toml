[profile.default]
out = "out"
libs = ["lib"]
deny = "warnings"
optimizer = true
optimizer_runs = 100000
dynamic_test_linking = false
isolate = true
gas_reports = [
  "AssetSilo",
  "AssetToken",
  "CollateralManager",
  "CollateralManagerHarness",
  "Controller",
  "ControllerHarness",
  "CustodianModule",
  "ERC1967Proxy",
  "GoldOracleAdapter",
  "MultiCall",
  "RevenueModule",
  "StakedAsset",
  "StakedAssetHarness",
  "SwapModule",
  "SwapModuleHarness"
]
fs_permissions = [{ access = "read-write", path = "./" }]

# compile production contracts with via-ir
[profile.production]
src = "src"
skip = ["test/**/*"]
via_ir = true
ffi = true
optimizer = true
optimizer_runs = 8888888

[lint]
ignore = ["test/external/**/*", "test/echidna/**/*"]
exclude_lints = [
  "mixed-case-variable",
  "screaming-snake-case-immutable",
  "asm-keccak256",
  "unwrapped-modifier-logic"
]

[fuzz]
runs = 10000

[profile.coverage]
skip = [
  "test/echidna/*",
  "test/external/*",
  "test/fork/*",
  "test/integration/*",
  "test/invariant/*", 
  "test/mocks/*", 
  "script/*"
]

[rpc_endpoints]
mainnet = "${MAINNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
dstSepolia = "${RPC_URL_ARBITRUM_SEPOLIA}"

[invariant]
runs = 888
depth = 50
fail_on_revert = false